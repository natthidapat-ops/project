<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondLife — รายละเอียด</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .detail-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--warm);
      border-radius: var(--r);
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html"><span class="logo-icon">♻</span>SecondLife</a>
    <div class="nav-links">
      <a href="index.html">หน้าหลัก</a>
      <a href="post.html" class="pill">+ ลงประกาศ</a>
      <a href="my.html">ของฉัน</a>
      <a href="login.html" id="nav-login">เข้าสู่ระบบ</a>
      <a href="#" id="nav-logout" style="display:none">ออกจากระบบ</a>
    </div>
  </nav>

  <div class="container">
    <button class="back-btn" onclick="history.back()">← กลับ</button>

    <div class="detail-layout">
      <!-- ซ้าย -->
      <div>
        <div class="detail-img" id="img">📦</div>
        <div style="margin-top:20px">
          <h1 id="title" style="font-size:22px;font-weight:600;margin-bottom:8px">กำลังโหลด...</h1>
          <div class="detail-price" id="price"></div>
          <div class="card-meta" id="meta" style="margin-bottom:14px"></div>
          <p id="desc" style="color:var(--muted);line-height:1.8;font-size:14px"></p>
        </div>
      </div>

      <!-- ขวา -->
      <div>
        <!-- ข้อมูลผู้ขาย -->
        <div class="detail-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px">ผู้ขาย</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:38px;height:38px;border-radius:50%;background:var(--acc-lt);display:flex;align-items:center;justify-content:center;font-size:16px">👤</div>
            <div>
              <div style="font-weight:500" id="seller"></div>
              <div style="font-size:12px;color:var(--muted)" id="seller-email"></div>
            </div>
          </div>
        </div>

        <!-- ข้อความส่วนตัว -->
        <div class="detail-box">
          <div style="font-weight:500;margin-bottom:10px">✉️ ข้อความส่วนตัวถึงผู้ขาย</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">เฉพาะเจ้าของประกาศเห็น</div>
          <div id="msg-alert"></div>
          <div class="fg" style="margin-bottom:10px">
            <textarea id="msg-text" placeholder="พิมพ์ข้อความถึงผู้ขาย..." rows="3"></textarea>
          </div>
          <button class="btn btn-primary btn-full" onclick="sendMsg()">ส่งข้อความ</button>
        </div>
      </div>
    </div>

    <!-- คอมเม้นท์สาธารณะ -->
    <div style="margin-top:28px">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px">💬 คอมเม้นท์ (ทุกคนเห็น)</div>
      <div class="msg-list" id="comment-list" style="max-height:none;gap:10px;margin-bottom:16px">
        <p style="font-size:13px;color:var(--muted)">กำลังโหลด...</p>
      </div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px">
        <div id="comment-alert"></div>
        <div class="fg" style="margin-bottom:10px">
          <textarea id="comment-text" placeholder="เขียนคอมเม้นท์..." rows="3"></textarea>
        </div>
        <button class="btn btn-secondary" onclick="postComment()">โพสต์คอมเม้นท์</button>
      </div>
    </div>
  </div>

  <footer>SecondLife © 2025</footer>

  <script src="toast.js"></script>
  <script src="detail.js"></script>
</body>
</html>
