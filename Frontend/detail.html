<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondLife — รายละเอียด</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .detail-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--r);
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html"><span class="logo-icon">♻</span>SecondLife</a>
    <div class="nav-links">
      <a href="index.html">หน้าหลัก</a>
      <a href="post.html" class="pill">+ ลงประกาศ</a>
      <a href="my.html">ของฉัน</a>
      <a href="login.html" id="nav-login">เข้าสู่ระบบ</a>
    </div>
  </nav>

  <div class="container">
    <button class="back-btn" onclick="history.back()">← กลับ</button>

    <div class="detail-layout">
      <!-- ซ้าย -->
      <div>
        <div class="detail-img" id="img">📦</div>
        <div style="margin-top:20px">
          <h1 id="title" style="font-size:22px;font-weight:600;margin-bottom:8px">กำลังโหลด...</h1>
          <div class="detail-price" id="price"></div>
          <div class="card-meta" id="meta" style="margin-bottom:14px"></div>
          <p id="desc" style="color:var(--muted);line-height:1.8;font-size:14px"></p>
        </div>
      </div>

      <!-- ขวา -->
      <div>
        <div class="detail-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px">ผู้ขาย</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:38px;height:38px;border-radius:50%;background:var(--acc-lt);display:flex;align-items:center;justify-content:center;font-size:16px">👤</div>
            <div>
              <div style="font-weight:500" id="seller"></div>
              <div style="font-size:12px;color:var(--muted)" id="seller-email"></div>
            </div>
          </div>
        </div>

        <div class="detail-box">
          <div style="font-weight:500;margin-bottom:10px">ติดต่อผู้ขาย</div>
          <div id="alert"></div>
          <div class="msg-list" id="msg-list"></div>
          <div class="fg" style="margin-top:10px;margin-bottom:10px">
            <textarea id="msg-text" placeholder="พิมพ์ข้อความถึงผู้ขาย..." rows="3"></textarea>
          </div>
          <button class="btn btn-primary btn-full" onclick="sendMsg()">ส่งข้อความ</button>
        </div>
      </div>
    </div>
  </div>

  <footer>SecondLife © 2025</footer>

  <script>
    const API   = 'http://localhost:8000';
    const ICONS = {'อิเล็กทรอนิกส์':'📱','เฟอร์นิเจอร์':'🛋️','แฟชั่น':'👜','กีฬา':'🚴','หนังสือ':'📚','อื่นๆ':'📦'};
    const id    = new URLSearchParams(location.search).get('id');
    const user  = JSON.parse(localStorage.getItem('user') || 'null');

    if (user) {
      document.getElementById('nav-login').textContent = '👤 ' + user.name;
      document.getElementById('nav-login').href = 'my.html';
    }

    // SPI 2 — GET /listings/:id
    async function loadDetail() {
      const res  = await fetch(`${API}/listings/${id}`);
      const item = await res.json();

      // แสดงรูปถ้ามี ถ้าไม่มีแสดง emoji
      const imgEl = document.getElementById('img');
      if (item.image_url) {
        imgEl.innerHTML = `<img src="${API}${item.image_url}" alt="${item.title}">`;
      } else {
        imgEl.textContent = ICONS[item.category] || '📦';
      }

      document.getElementById('title').textContent        = item.title;
      document.getElementById('price').textContent        = '฿' + Number(item.price).toLocaleString();
      document.getElementById('desc').textContent         = item.description || '';
      document.getElementById('seller').textContent       = item.seller_name;
      document.getElementById('seller-email').textContent = item.seller_email;
      document.getElementById('meta').innerHTML = `
        <span class="badge">${item.category}</span>
        <span class="badge badge-green">${item.condition}</span>
      `;
      document.title = 'SecondLife — ' + item.title;
    }

    // SPI 5 — POST /messages
    async function sendMsg() {
      const content = document.getElementById('msg-text').value.trim();
      if (!content) return;

      const res  = await fetch(`${API}/messages`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          listing_id: id,
          sender_id:  user?.id || 1,
          content:    content
        })
      });
      const data    = await res.json();
      const alertEl = document.getElementById('alert');

      if (res.ok) {
        alertEl.className   = 'alert alert-ok';
        alertEl.textContent = data.message;
        document.getElementById('msg-text').value = '';
        document.getElementById('msg-list').innerHTML += `
          <div class="msg-bubble">
            <div class="msg-sender">${user?.name || 'คุณ'}</div>
            <div>${content}</div>
          </div>
        `;
        setTimeout(() => { alertEl.textContent=''; alertEl.className=''; }, 3000);
      } else {
        alertEl.className   = 'alert alert-err';
        alertEl.textContent = data.message;
      }
    }

    loadDetail();
  </script>
</body>
</html>
