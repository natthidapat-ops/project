<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondLife — เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav>
    <a class="logo" href="index.html"><span class="logo-icon">♻</span>SecondLife</a>
    <div class="nav-links">
      <a href="index.html">หน้าหลัก</a>
      <a href="login.html" class="active">เข้าสู่ระบบ</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-wrap" style="margin-top:20px">
      <h1>ยินดีต้อนรับ</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">เข้าสู่ระบบ</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">สมัครสมาชิก</button>
      </div>

      <div id="alert"></div>

      <!-- Login -->
      <div id="form-login">
        <div class="fg">
          <label>อีเมล</label>
          <input type="email" id="login-email" placeholder="email@example.com">
        </div>
        <div class="fg">
          <label>รหัสผ่าน</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">เข้าสู่ระบบ</button>
      </div>

      <!-- Register -->
      <div id="form-register" style="display:none">
        <div class="fg">
          <label>ชื่อ *</label>
          <input type="text" id="reg-name" placeholder="ชื่อของคุณ">
        </div>
        <div class="fg">
          <label>อีเมล *</label>
          <input type="email" id="reg-email" placeholder="email@example.com">
        </div>
        <div class="fg">
          <label>รหัสผ่าน *</label>
          <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <div class="fg">
          <label>แนะนำตัวเอง</label>
          <input type="text" id="reg-desc" placeholder="เช่น ขายของมือสองจากเชียงใหม่">
        </div>
        <button class="btn btn-primary btn-full" onclick="register()">สมัครสมาชิก</button>
      </div>

    </div>
  </div>

  <footer>SecondLife © 2025</footer>

  <script src="toast.js"></script>
  <script src="login.js">
    
  </script>
</body>
</html>
