<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondLife</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html"><span class="logo-icon">♻</span>SecondLife</a>
    <div class="nav-links">
      <a href="index.html" class="active">หน้าหลัก</a>
      <a href="post.html" class="pill">+ ลงประกาศ</a>
      <a href="my.html">ของฉัน</a>
      <a href="login.html" id="nav-login">เข้าสู่ระบบ</a>
      <a href="#" id="nav-logout" style="display:none">ออกจากระบบ</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-tag">Secondhand Marketplace</div>
      <h1>ของดี ราคาถูก<br><span>หาที่นี่</span></h1>
      <p>แลกเปลี่ยน ซื้อขาย สินค้ามือสองคุณภาพดี จากคนจริงๆ ใกล้บ้านคุณ</p>
    </div>
  </div>

  <div class="container">
    <div class="filter-bar">
      <input type="text" id="search" placeholder="ค้นหาสินค้า...">
      <select id="category">
        <option value="">ทุกประเภท</option>
        <option>อิเล็กทรอนิกส์</option>
        <option>เฟอร์นิเจอร์</option>
        <option>แฟชั่น</option>
        <option>กีฬา</option>
        <option>หนังสือ</option>
        <option>อื่นๆ</option>
      </select>
      <select id="condition">
        <option value="">ทุกสภาพ</option>
        <option>ดีมาก</option>
        <option>ดี</option>
        <option>พอใช้</option>
      </select>
      <button class="btn btn-primary" onclick="loadListings()">ค้นหา</button>
    </div>

    <div class="section-header">
      <span class="section-title">สินค้าทั้งหมด</span>
      <span class="section-count" id="count"></span>
    </div>

    <div class="grid" id="list">
      <p style="color:var(--muted)">กำลังโหลด...</p>
    </div>
  </div>

  <footer>SecondLife © 2025 — แลกเปลี่ยนสินค้ามือสอง ลดขยะ เพิ่มคุณค่า</footer>

  <script src="toast.js"></script>
  <script src="index.js">
    
  </script>
</body>
</html>
