<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondLife — ลงประกาศ</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      background: var(--warm);
    }
    .upload-area:hover { border-color: var(--accent); background: var(--acc-lt); }
    .upload-area input { display: none; }
    .upload-icon { font-size: 32px; margin-bottom: 8px; }
    .upload-text { font-size: 13px; color: var(--muted); }
    .preview-img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html"><span class="logo-icon">♻</span>SecondLife</a>
    <div class="nav-links">
      <a href="index.html">หน้าหลัก</a>
      <a href="post.html" class="pill active">+ ลงประกาศ</a>
      <a href="my.html">ของฉัน</a>
      <a href="login.html" id="nav-login">เข้าสู่ระบบ</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-wrap">
      <h1>ลงประกาศขาย / แลก</h1>
      <div id="alert"></div>

      <div class="fg">
        <label>ชื่อสินค้า *</label>
        <input type="text" id="title" placeholder="เช่น iPhone 13 Pro มือสอง">
      </div>

      <div class="fg">
        <label>คำอธิบาย</label>
        <textarea id="description" placeholder="รายละเอียดสินค้า สภาพการใช้งาน..."></textarea>
      </div>

      <div class="grid-2">
        <div class="fg">
          <label>ราคา (บาท) *</label>
          <input type="number" id="price" placeholder="0" min="0">
        </div>
        <div class="fg">
          <label>ประเภทสินค้า *</label>
          <select id="category">
            <option value="">-- เลือก --</option>
            <option>อิเล็กทรอนิกส์</option>
            <option>เฟอร์นิเจอร์</option>
            <option>แฟชั่น</option>
            <option>กีฬา</option>
            <option>หนังสือ</option>
            <option>อื่นๆ</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label>สภาพสินค้า *</label>
        <select id="condition">
          <option value="">-- เลือก --</option>
          <option>ดีมาก</option>
          <option>ดี</option>
          <option>พอใช้</option>
        </select>
      </div>

      <!-- ช่อง Upload รูป -->
      <div class="fg">
        <label>รูปสินค้า (ไม่บังคับ)</label>
        <div class="upload-area" onclick="document.getElementById('image').click()">
          <input type="file" id="image" accept=".jpg,.jpeg,.png,.webp" onchange="previewImage(this)">
          <div class="upload-icon">📷</div>
          <div class="upload-text">คลิกเพื่อเลือกรูป (jpg, png, webp ขนาดไม่เกิน 5MB)</div>
        </div>
        <img id="preview" class="preview-img" alt="preview">
      </div>

      <button class="btn btn-primary btn-full" onclick="postListing()" id="submit-btn">ลงประกาศ</button>
    </div>
  </div>

  <footer>SecondLife © 2025</footer>

  <script>
    const API  = 'http://localhost:8000';
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (user) {
      document.getElementById('nav-login').textContent = '👤 ' + user.name;
      document.getElementById('nav-login').href = 'my.html';
    }

    // แสดง preview รูปก่อนอัปโหลด
    function previewImage(input) {
      const preview = document.getElementById('preview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src     = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // SPI 3 — POST /listings
    // ใช้ FormData แทน JSON เพราะต้องส่งไฟล์รูปด้วย
    async function postListing() {
      const btn = document.getElementById('submit-btn');
      btn.disabled    = true;
      btn.textContent = 'กำลังบันทึก...';

      // ใช้ FormData แทน JSON เพราะมีไฟล์รูป
      const formData = new FormData();
      formData.append('user_id',     user?.id || 1);
      formData.append('title',       document.getElementById('title').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('price',       document.getElementById('price').value);
      formData.append('category',    document.getElementById('category').value);
      formData.append('condition',   document.getElementById('condition').value);
      formData.append('status', 'available');

      // เพิ่มรูปถ้ามีการเลือก
      const imageFile = document.getElementById('image').files[0];
      
      if (imageFile) {
        formData.append('image', imageFile);
      }

      // ไม่ต้องใส่ Content-Type เพราะ browser จะจัดการให้เองตอนส่ง FormData
      const res  = await fetch(`${API}/listings`, {
        method: 'POST',
        body:   formData
      });
      const data    = await res.json();
      const alertEl = document.getElementById('alert');

      if (res.ok) {
        alertEl.className   = 'alert alert-ok';
        alertEl.textContent = data.message;
        setTimeout(() => location.href = 'index.html', 1500);
      } else {
        alertEl.className   = 'alert alert-err';
        alertEl.textContent = data.message || 'เกิดข้อผิดพลาด';
        btn.disabled    = false;
        btn.textContent = 'ลงประกาศ';
      }
    }
  </script>
</body>
</html>
